<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="description" content="Inventory tracking for things you actually care about">
  <title>Pocket Universe</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="root">
    <canvas id="star-canvas" aria-hidden="true"></canvas>

    <header class="app-header" id="app-header">
      <a href="/" class="app-logo" data-link aria-label="Pocket Universe home">
        <span class="app-logo__mark" aria-hidden="true">🌌</span>
        <span class="app-logo__name">Pocket Universe</span>
      </a>
      <div style="display:flex;align-items:center;gap:var(--space-2)">
        <div class="theme-picker" id="theme-picker">
          <button class="btn btn-ghost btn-sm btn-icon" id="theme-picker-btn" aria-label="Change theme" title="Change theme">
            <span id="theme-indicator"></span>
          </button>
          <div class="theme-panel" id="theme-panel" hidden>
            <button class="theme-swatch" data-theme-pick="space">
              <span class="theme-swatch__dot" style="background:#60a5fa"></span>Deep Space
            </button>
            <button class="theme-swatch" data-theme-pick="nebula">
              <span class="theme-swatch__dot" style="background:#c084fc"></span>Nebula
            </button>
            <button class="theme-swatch" data-theme-pick="aurora">
              <span class="theme-swatch__dot" style="background:#34d399"></span>Aurora
            </button>
            <button class="theme-swatch" data-theme-pick="pulsar">
              <span class="theme-swatch__dot" style="background:#fb923c"></span>Pulsar
            </button>
          </div>
        </div>
        <div class="app-header__actions" id="header-actions">
          <!-- populated by router based on auth state -->
        </div>
      </div>
    </header>

    <nav id="breadcrumb-bar" class="breadcrumb-bar" aria-label="Breadcrumb" hidden></nav>

    <main id="app" aria-live="polite" aria-atomic="false">
      <div class="page-loader" aria-label="Loading…" role="status">
        <div class="page-loader__spinner"></div>
      </div>
    </main>

    <nav class="bottom-nav" id="bottom-nav" hidden aria-label="Navigation">
      <a href="/galaxies" class="bottom-nav__item" data-link data-nav="galaxies">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Galaxies</span>
      </a>
      <a href="/profile" class="bottom-nav__item" data-link data-nav="profile">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span>Profile</span>
      </a>
    </nav>

  </div>

  <!-- QR code generator -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Datastar: reactive UI + SSE DOM merging (no npm required) -->
  <!-- https://data-star.dev -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@starfederation/datastar@latest/dist/datastar.min.js"></script>

  <!-- App modules -->
  <script type="module" src="/js/db.js"></script>
  <script type="module" src="/js/components/quantity-stepper.js"></script>
  <script type="module" src="/js/router.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(console.error)
      })
    }
  </script>
</body>
</html>
